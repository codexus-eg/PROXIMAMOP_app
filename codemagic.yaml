workflows:
  proximamop-ios-testflight-workflow:
    name: PROXIMAMOP iOS Build and Publish to TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: noourway

    environment:
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - PROXIMAMOP_Manual_Profile
        certificates:
          - ios_cert_manual

    scripts:
      - name: Install .NET 10 SDK and MAUI Workload
        script: |
          # 1. تنزيل أداة التثبيت الرسمية من مايكروسوفت
          curl -L https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x ./dotnet-install.sh

          # 2. تثبيت إصدار .NET 10 المطابق لمشروعك
          ./dotnet-install.sh --channel 10.0

          # 3. حفظ مسار الأوامر ليتم التعرف على كلمة dotnet في كل الخطوات القادمة
          export DOTNET_ROOT=$HOME/.dotnet
          export PATH=$DOTNET_ROOT:$DOTNET_ROOT/tools:$PATH
          echo 'export DOTNET_ROOT=$HOME/.dotnet' >> $CM_ENV
          echo 'export PATH=$DOTNET_ROOT:$DOTNET_ROOT/tools:$PATH' >> $CM_ENV

          # 4. تثبيت حزم MAUI
          dotnet workload install maui

      - name: Apply Vault Profiles
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          # البناء باستخدام إعدادات MAUI للآيفون
          dotnet publish PROXIMAMOP.csproj \
            -f net10.0-ios \
            -c Release \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64

    artifacts:
      - "**/*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - codexus.eg@gmail.com
