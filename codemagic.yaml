workflows:
  proximamop-ios-testflight-workflow:
    name: PROXIMAMOP iOS Build and Publish to TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: noourway

    environment:
      xcode: 26.5
      ios_signing:
        provisioning_profiles:
          - PROXIMAMOP_Manual_Profile
        certificates:
          - ios_cert_manual

    scripts:
      - name: Install .NET 10 SDK and MAUI Workload
        script: |
          curl -L https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x ./dotnet-install.sh
          ./dotnet-install.sh --channel 10.0

          export PATH=$HOME/.dotnet:$PATH
          dotnet workload install maui

      - name: Setup Keychain and Apply Profiles
        script: |
          # 1. تهيئة سلسلة المفاتيح الخاصة بنظام الماك
          keychain initialize

          # 2. حقن الشهادة بداخلها لتصبح مرئية لـ .NET
          keychain add-certificates

          # 3. ربط البروفايل
          xcode-project use-profiles

      - name: Build IPA
        script: |
          export PATH=$HOME/.dotnet:$PATH

          # طباعة الشهادات المتاحة في السجل للتأكد من نجاح الخطوة السابقة
          security find-identity -v -p codesigning

          # البناء (قمنا بإزالة التحديد اليدوي لنجعل MAUI يلتقط الشهادة تلقائياً)
          dotnet publish PROXIMAMOP.csproj \
            -f net10.0-ios \
            -c Release \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64

    artifacts:
      - "**/*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - codexus.eg@gmail.com
