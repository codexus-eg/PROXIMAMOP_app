<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

	<defs>
		<!-- Gold gradient -->
		<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#FFD700"/>
			<stop offset="100%" stop-color="#B8860B"/>
		</linearGradient>

		<!-- Dark red ring -->
		<linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#B22222"/>
			<stop offset="100%" stop-color="#5A0000"/>
		</linearGradient>
	</defs>

	<!-- outer circle -->
	<circle cx="256" cy="256" r="170" fill="#5A0000"/>

	<!-- main ring -->
	<circle cx="256" cy="256" r="150" fill="url(#ring)"/>

	<!-- inner circle -->
	<circle cx="256" cy="256" r="125" fill="#8B0000"/>

	<!-- letter P -->
	<g fill="url(#gold)">
		<!-- vertical bar -->
		<rect x="185" y="140" width="55" height="230" rx="25"/>

		<!-- top circle -->
		<circle cx="270" cy="205" r="70"/>

		<!-- hole -->
		<circle cx="285" cy="205" r="35" fill="#8B0000"/>

		<!-- cut connection -->
		<rect x="240" y="205" width="50" height="40"/>
	</g>

</svg>