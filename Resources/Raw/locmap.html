<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>LOCMAP</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020617;
            font-family: Arial, sans-serif;
            touch-action: none;
            overscroll-behavior: none;
        }

        #canvas {
            position: fixed;
            inset: 0;
            width: 100dvw;
            height: 100dvh;
            display: block;
            background: #020617;
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { alpha: false });

        let latestData = null;

        let viewW = 0;
        let viewH = 0;
        let dpr = 1;

        let zoomX = 1;
        let zoomY = 1;
        let panX = 0;
        let panY = 0;

        let isDragging = false;
        let priceScaleDragging = false;
        let timeScaleDragging = false;

        let lastX = 0;
        let lastY = 0;
        let lastDistance = 0;
        let lastTapTime = 0;

        const MIN_ZOOM_X = 1;
        const MAX_ZOOM_X = 34;
        const MIN_ZOOM_Y = 0.45;
        const MAX_ZOOM_Y = 32;

        const PRICE_AXIS_W = 86;
        const PRICE_DRAG_W = 24;
        const TIME_AXIS_H = 24;
        const TIME_DRAG_H = 24;

        const COLORS = {
            bg: "#020617",
            panel: "#06111d",

            gridMinor: "rgba(75,100,130,0.13)",
            gridMajor: "rgba(200,164,77,0.30)",

            border: "rgba(148,163,184,0.36)",

            green: "#22C55E",
            greenSoft: "rgba(34,197,94,0.82)",

            gold: "#C8A44D",
            white: "#F8FAFC",

            markerLine: "rgba(255,255,255,0.58)",

            drag: "rgba(255,255,255,0.025)",
            dragActive: "rgba(200,164,77,0.17)"
        };

        function resetTransform() {
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 3);

            viewW = Math.floor(window.visualViewport?.width || window.innerWidth);
            viewH = Math.floor(window.visualViewport?.height || window.innerHeight);

            canvas.style.width = viewW + "px";
            canvas.style.height = viewH + "px";

            canvas.width = Math.floor(viewW * dpr);
            canvas.height = Math.floor(viewH * dpr);

            resetTransform();
            clampPan();
            draw();
        }

        window.addEventListener("resize", resize, { passive: true });
        window.visualViewport?.addEventListener("resize", resize, { passive: true });

        function showMessage(msg) {
            resetTransform();

            ctx.clearRect(0, 0, viewW, viewH);
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, viewW, viewH);

            ctx.fillStyle = COLORS.white;
            ctx.font = "700 18px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(msg, viewW / 2, viewH / 2);
        }

        window.showMessage = showMessage;

        function setHeatmap(base64) {
            try {
                latestData = JSON.parse(atob(base64));
                draw();
            } catch {
                showMessage("LOCMAP parse error");
            }
        }

        window.setHeatmap = setHeatmap;

        function getLayout() {
            const leftPad = 4;
            const topPad = 4;
            const rightPad = PRICE_AXIS_W + PRICE_DRAG_W + 4;
            const bottomPad = TIME_AXIS_H + TIME_DRAG_H + 4;

            const heatW = Math.max(120, viewW - leftPad - rightPad);
            const heatH = Math.max(120, viewH - topPad - bottomPad);

            return {
                w: viewW,
                h: viewH,

                leftPad,
                topPad,

                heatW,
                heatH,

                priceAxisX: leftPad + heatW,
                priceAxisY: topPad,
                priceAxisW: PRICE_AXIS_W,
                priceAxisH: heatH,

                priceDragX: leftPad + heatW + PRICE_AXIS_W,
                priceDragY: topPad,
                priceDragW: PRICE_DRAG_W,
                priceDragH: heatH,

                timeAxisX: leftPad,
                timeAxisY: topPad + heatH,
                timeAxisW: heatW,
                timeAxisH: TIME_AXIS_H,

                timeDragX: leftPad,
                timeDragY: topPad + heatH + TIME_AXIS_H,
                timeDragW: heatW,
                timeDragH: TIME_DRAG_H
            };
        }

        function clampPan() {
            const l = getLayout();

            if (zoomX <= MIN_ZOOM_X) {
                zoomX = MIN_ZOOM_X;
                panX = 0;
            }

            const minX = -(l.heatW * zoomX - l.heatW);
            const minY = -(l.heatH * zoomY - l.heatH);

            panX = Math.min(0, Math.max(minX, panX));
            panY = Math.min(0, Math.max(minY, panY));
        }

        function getHeatColor(v) {
            if (v < 18) return null;
            if (v < 32) return "rgba(0,180,255,0.30)";
            if (v < 48) return "rgba(34,197,94,0.48)";
            if (v < 64) return "rgba(255,220,40,0.64)";
            if (v < 78) return "rgba(255,145,30,0.78)";
            return "rgba(255,35,20,0.94)";
        }

        function getHeatHeight(v, cellH) {
            if (v < 32) return Math.max(0.7, cellH * 0.14);
            if (v < 48) return Math.max(0.9, cellH * 0.22);
            if (v < 64) return Math.max(1.1, cellH * 0.32);
            if (v < 78) return Math.max(1.4, cellH * 0.44);
            return Math.max(1.8, cellH * 0.58);
        }

        function getZoneColor(v) {
            if (v >= 101) {
                return zoomY >= 2
                    ? "rgba(255,255,255,0.24)"
                    : "rgba(255,255,255,0.18)";
            }

            if (v >= 96) {
                return zoomY >= 2
                    ? "rgba(168,85,247,0.11)"
                    : "rgba(168,85,247,0.075)";
            }

            return null;
        }

        function getZoneHeight(v, cellH) {
            if (v >= 101)
                return Math.max(2.0, cellH * 1.8);

            if (v >= 96)
                return Math.max(1.5, cellH * 1.5);

            return cellH;
        }

        function draw() {
            if (!latestData) {
                showMessage("Waiting for LOCMAP data...");
                return;
            }

            const d = latestData;
            const rows = Number(d.rows);
            const cols = Number(d.cols);
            const heat = d.heat || [];
            const zones = d.zones || [];
            const colVol = d.colVol || [];

            if (!rows || !cols || heat.length < rows * cols) {
                showMessage("Invalid LOCMAP matrix");
                return;
            }

            clampPan();

            const l = getLayout();
            const cellW = l.heatW / cols;
            const cellH = l.heatH / rows;

            resetTransform();

            ctx.clearRect(0, 0, l.w, l.h);

            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, l.w, l.h);

            ctx.fillStyle = COLORS.panel;
            ctx.fillRect(l.leftPad, l.topPad, l.heatW, l.heatH);

            ctx.save();
            ctx.beginPath();
            ctx.rect(l.leftPad, l.topPad, l.heatW, l.heatH);
            ctx.clip();

            ctx.translate(l.leftPad + panX, l.topPad + panY);
            ctx.scale(zoomX, zoomY);

            drawStoredZones(rows, cols, zones, cellW, cellH);
            drawLiquidityLines(rows, cols, heat, cellW, cellH);
            drawGrid(rows, cols, l.heatW, l.heatH);

            ctx.restore();

            drawVolumeNumbers(d, l, cellW, cellH, colVol);
            drawPriceAxis(d, rows, l);
            drawTimeAxis(cols, l);
            drawPriceMarker(d, l);
            drawScaleZones(l);
            drawBorder(l);
        }

        function drawStoredZones(rows, cols, zones, cellW, cellH) {
            if (!zones || zones.length < rows * cols)
                return;

            for (let r = 0; r < rows; r++) {
                const yCenter = r * cellH + cellH / 2;

                for (let c = 0; c < cols; c++) {
                    const value = Number(zones[r * cols + c] || 0);
                    const color = getZoneColor(value);

                    if (!color)
                        continue;

                    const x = c * cellW;
                    const lineH = getZoneHeight(value, cellH);
                    const y = yCenter - lineH / 2;

                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, Math.ceil(cellW + 0.35), lineH);
                }
            }
        }

        function drawLiquidityLines(rows, cols, heat, cellW, cellH) {
            for (let r = 0; r < rows; r++) {
                const yCenter = r * cellH + cellH / 2;

                for (let c = 0; c < cols; c++) {
                    const value = Number(heat[r * cols + c] || 0);
                    const color = getHeatColor(value);

                    if (!color)
                        continue;

                    const x = c * cellW;
                    const lineH = getHeatHeight(value, cellH);
                    const y = yCenter - lineH / 2;

                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, Math.ceil(cellW + 0.35), lineH);

                    if (value >= 86) {
                        ctx.fillStyle = "rgba(255,255,255,0.18)";
                        ctx.fillRect(
                            x,
                            y,
                            Math.ceil(cellW + 0.35),
                            Math.max(0.7, lineH * 0.22)
                        );
                    }
                }
            }
        }

        function drawGrid(rows, cols, heatW, heatH) {
            const cellW = heatW / cols;
            const cellH = heatH / rows;

            ctx.lineWidth = 1 / Math.max(zoomX, zoomY);
            ctx.strokeStyle = COLORS.gridMinor;

            const rowStepMinor = zoomY < 0.8 ? 5 : zoomY < 1.4 ? 3 : 1;
            const colStepMinor = zoomX < 1.4 ? 2 : 1;

            for (let c = 0; c <= cols; c += colStepMinor) {
                const x = c * cellW;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, heatH);
                ctx.stroke();
            }

            for (let r = 0; r <= rows; r += rowStepMinor) {
                const y = r * cellH;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(heatW, y);
                ctx.stroke();
            }

            ctx.strokeStyle = COLORS.gridMajor;
            ctx.lineWidth = 1.2 / Math.max(zoomX, zoomY);

            for (let c = 0; c <= cols; c += 10) {
                const x = c * cellW;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, heatH);
                ctx.stroke();
            }

            for (let r = 0; r <= rows; r += 20) {
                const y = r * cellH;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(heatW, y);
                ctx.stroke();
            }
        }

        function drawPriceAxis(d, rows, l) {
            const lo = Number(d.lo);
            const hi = Number(d.hi);

            if (!isFinite(lo) || !isFinite(hi) || hi <= lo)
                return;

            const cellH = l.heatH / rows;

            const rowStep =
                zoomY >= 5 ? 4 :
                    zoomY >= 2.5 ? 8 :
                        zoomY >= 1.2 ? 14 :
                            20;

            ctx.font = "800 11px Consolas, monospace";
            ctx.fillStyle = COLORS.greenSoft;
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";

            for (let r = 0; r < rows; r += rowStep) {
                const y = l.topPad + panY + (r * cellH + cellH / 2) * zoomY;

                if (y < l.topPad + 5 || y > l.topPad + l.heatH - 5)
                    continue;

                const t = 1 - r / Math.max(1, rows - 1);
                const price = lo + (hi - lo) * t;

                ctx.fillText(price.toFixed(1), l.priceAxisX + 7, y);
            }
        }

        function drawTimeAxis(cols, l) {
            const colStep =
                zoomX >= 8 ? 2 :
                    zoomX >= 4 ? 4 :
                        zoomX >= 2 ? 8 :
                            12;

            const cellW = l.heatW / cols;

            ctx.font = "800 10px Consolas, monospace";
            ctx.fillStyle = COLORS.greenSoft;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let c = 0; c < cols; c += colStep) {
                const x = l.leftPad + panX + (c * cellW + cellW / 2) * zoomX;

                if (x < l.leftPad + 4 || x > l.leftPad + l.heatW - 4)
                    continue;

                ctx.fillText(String(c + 1), x, l.timeAxisY + 12);
            }
        }

        function drawVolumeNumbers(d, l, cellW, cellH, colVol) {
            const rows = Number(d.rows);
            const cols = Number(d.cols);
            const heat = d.heat || [];

            const fontSize =
                zoomX >= 4 ? 11 :
                    zoomX >= 2 ? 9 :
                        7;

            ctx.font = `800 ${fontSize}px Consolas, monospace`;
            ctx.fillStyle = COLORS.green;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.shadowColor = "rgba(0,0,0,0.95)";
            ctx.shadowBlur = 3;

            for (let c = 0; c < cols; c++) {
                if (zoomX < 1.2 && c % 2 !== 0)
                    continue;

                const v = Number(colVol[c] || 0);
                if (v <= 0)
                    continue;

                let strongestRow = -1;
                let strongestValue = 0;

                for (let r = 0; r < rows; r++) {
                    const value = Number(heat[r * cols + c] || 0);

                    if (value > strongestValue) {
                        strongestValue = value;
                        strongestRow = r;
                    }
                }

                if (strongestRow < 0 || strongestValue < 48)
                    continue;

                const x = l.leftPad + panX + (c * cellW + cellW / 2) * zoomX;
                const y = l.topPad + panY + (strongestRow * cellH + cellH / 2) * zoomY;

                if (x < l.leftPad + 2 || x > l.leftPad + l.heatW - 2)
                    continue;

                if (y < l.topPad + 2 || y > l.topPad + l.heatH - 2)
                    continue;

                const text = String(Math.round(v));

                for (let i = 0; i < text.length; i++) {
                    ctx.fillText(text[i], x, y + i * fontSize * 0.85);
                }
            }

            ctx.shadowBlur = 0;
        }

        function drawPriceMarker(d, l) {
            const lo = Number(d.lo);
            const hi = Number(d.hi);
            const price = Number(d.price);

            if (!isFinite(lo) || !isFinite(hi) || !isFinite(price) || hi <= lo)
                return;

            const t = Math.max(0, Math.min(1, (price - lo) / (hi - lo)));
            const yBase = l.heatH - t * l.heatH;
            const y = l.topPad + panY + yBase * zoomY;

            if (y < l.topPad || y > l.topPad + l.heatH)
                return;

            ctx.strokeStyle = COLORS.markerLine;
            ctx.lineWidth = 1.4;

            ctx.beginPath();
            ctx.moveTo(l.leftPad, y);
            ctx.lineTo(l.leftPad + l.heatW, y);
            ctx.stroke();

            const x = l.priceAxisX + 8;

            ctx.fillStyle = COLORS.white;
            ctx.beginPath();
            ctx.arc(x, y, 5.4, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = "800 14px Arial";
            ctx.fillStyle = COLORS.white;
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            ctx.fillText(price.toFixed(2), x + 10, y);
        }

        function drawScaleZones(l) {
            ctx.save();

            ctx.fillStyle = priceScaleDragging ? COLORS.dragActive : COLORS.drag;
            ctx.fillRect(l.priceDragX, l.priceDragY, l.priceDragW, l.priceDragH);

            ctx.fillStyle = timeScaleDragging ? COLORS.dragActive : COLORS.drag;
            ctx.fillRect(l.timeDragX, l.timeDragY, l.timeDragW, l.timeDragH);

            ctx.fillStyle = COLORS.gold;
            ctx.globalAlpha = 0.78;
            ctx.font = "800 9px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.save();
            ctx.translate(l.priceDragX + l.priceDragW / 2, l.priceDragY + l.priceDragH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText("SCALE", 0, 0);
            ctx.restore();

            ctx.fillText("TIME SCALE", l.timeDragX + l.timeDragW / 2, l.timeDragY + l.timeDragH / 2);

            ctx.restore();
        }

        function drawBorder(l) {
            ctx.strokeStyle = COLORS.border;
            ctx.lineWidth = 1;
            ctx.strokeRect(l.leftPad + 0.5, l.topPad + 0.5, l.heatW, l.heatH);
        }

        function isInPriceDragZone(x, y) {
            const l = getLayout();

            return x >= l.priceDragX &&
                x <= l.priceDragX + l.priceDragW &&
                y >= l.priceDragY &&
                y <= l.priceDragY + l.priceDragH;
        }

        function isInTimeDragZone(x, y) {
            const l = getLayout();

            return x >= l.timeDragX &&
                x <= l.timeDragX + l.timeDragW &&
                y >= l.timeDragY &&
                y <= l.timeDragY + l.timeDragH;
        }

        function distance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        canvas.addEventListener("touchstart", e => {
            e.preventDefault();

            if (e.touches.length === 1) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;

                priceScaleDragging = isInPriceDragZone(x, y);
                timeScaleDragging = isInTimeDragZone(x, y);
                isDragging = !priceScaleDragging && !timeScaleDragging;

                lastX = x;
                lastY = y;
            }

            if (e.touches.length === 2) {
                isDragging = false;
                priceScaleDragging = false;
                timeScaleDragging = false;
                lastDistance = distance(e.touches);
            }
        }, { passive: false });

        canvas.addEventListener("touchmove", e => {
            e.preventDefault();

            if (e.touches.length === 1) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;

                const dx = x - lastX;
                const dy = y - lastY;

                const l = getLayout();

                if (priceScaleDragging) {
                    const oldZoomY = zoomY;
                    const centerY = l.topPad + l.heatH / 2;
                    const contentY = (centerY - l.topPad - panY) / oldZoomY;

                    zoomY = Math.max(
                        MIN_ZOOM_Y,
                        Math.min(MAX_ZOOM_Y, zoomY * Math.exp(-dy * 0.012))
                    );

                    panY = centerY - l.topPad - contentY * zoomY;
                }
                else if (timeScaleDragging) {
                    const oldZoomX = zoomX;
                    const centerX = l.leftPad + l.heatW / 2;
                    const contentX = (centerX - l.leftPad - panX) / oldZoomX;

                    zoomX = Math.max(
                        MIN_ZOOM_X,
                        Math.min(MAX_ZOOM_X, zoomX * Math.exp(dx * 0.012))
                    );

                    panX = centerX - l.leftPad - contentX * zoomX;
                }
                else if (isDragging) {
                    panX += dx;
                    panY += dy;
                }

                lastX = x;
                lastY = y;

                clampPan();
                draw();
            }

            if (e.touches.length === 2) {
                const newDistance = distance(e.touches);

                if (lastDistance > 0) {
                    const oldZoomX = zoomX;
                    const oldZoomY = zoomY;
                    const factor = newDistance / lastDistance;

                    const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    const l = getLayout();

                    const contentX = (centerX - l.leftPad - panX) / oldZoomX;
                    const contentY = (centerY - l.topPad - panY) / oldZoomY;

                    zoomX = Math.max(MIN_ZOOM_X, Math.min(MAX_ZOOM_X, zoomX * factor));
                    zoomY = Math.max(MIN_ZOOM_Y, Math.min(MAX_ZOOM_Y, zoomY * factor));

                    panX = centerX - l.leftPad - contentX * zoomX;
                    panY = centerY - l.topPad - contentY * zoomY;

                    clampPan();
                    draw();
                }

                lastDistance = newDistance;
            }
        }, { passive: false });

        canvas.addEventListener("touchend", e => {
            const now = Date.now();

            if (e.changedTouches.length === 1 && now - lastTapTime < 280) {
                zoomX = 1;
                zoomY = 1;
                panX = 0;
                panY = 0;
                draw();
            }

            lastTapTime = now;

            if (e.touches.length === 0) {
                isDragging = false;
                priceScaleDragging = false;
                timeScaleDragging = false;
                lastDistance = 0;
            }
        }, { passive: false });

        resize();
        showMessage("Waiting for LOCMAP data...");
    </script>
</body>
</html>
